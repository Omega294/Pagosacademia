<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia - Sistema de Pagos</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <!-- Pantalla de Carga/Login -->
    <div id="view-login" style="display: flex; position: fixed; width: 100%; height: 100%; top: 0; left: 0; background: #0f172a; z-index: 1000; align-items: center; justify-content: center;">
        <div class="login-card glass-panel" style="text-align: center; padding: 40px; border-radius: 20px; width: 320px;">
            <i class="fas fa-graduation-cap" style="font-size:3rem; color: #0ea5e9; margin-bottom: 20px;"></i>
            <h2 style="color: white; margin-bottom: 5px;">Academia De Pagos</h2>
            <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 25px;">Control administrativo v6</p>
            <div style="position: relative; margin-bottom: 15px;">
                <input type="password" id="login-password" placeholder="admin123" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white;">
                <i class="fas fa-eye" id="toggle-p" style="position: absolute; right: 12px; top: 12px; cursor: pointer; color: #64748b;"></i>
            </div>
            <p id="login-error" style="color: #ef4444; font-size: 0.8rem; display: none; margin-bottom: 10px;">Acceso denegado</p>
            <button id="btn-do-login" style="width: 100%; padding: 12px; border-radius: 10px; border: none; background: #0ea5e9; color: white; font-weight: bold; cursor: pointer;">ENTRAR</button>
            <div id="debug-bypass" style="margin-top: 20px; font-size: 0.7rem; color: #475569; cursor: pointer; text-decoration: underline;">ACCESO DE EMERGENCIA</div>
        </div>
    </div>

    <!-- Contenido Principal (Oculto al inicio) -->
    <div id="app-container" class="hidden" style="display: none;">
        <!-- Seccion Dashboard -->
        <div style="padding: 20px;">
            <h1>Sistema Operativo</h1>
            <button onclick="location.reload()" class="btn-small">Cerrar Sesión</button>
        </div>
        <!-- Pagos -->
        <div class="glass-panel" style="margin: 20px; padding: 20px;">
            <h2>Panel Administrativo</h2>
            <p>Estado del sistema: Conectado</p>
            <div style="margin-top: 40px; display: grid; gap: 10px; grid-template-columns: 1fr 1fr;">
                <button class="btn-primary" onclick="alert('Estudiantes ready')">Alumnos</button>
                <button class="btn-primary" onclick="alert('Pagos ready')">Pagos</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // --- CODIGO BLINDADO V6 ---
        (function() {
            var state = { session: false };

            function alCargar() {
                var eye = document.getElementById('toggle-p');
                var pass = document.getElementById('login-password');
                var btn = document.getElementById('btn-do-login');
                var bypass = document.getElementById('debug-bypass');

                if (eye && pass) {
                    eye.onclick = function() {
                        var esPassword = pass.type === 'password';
                        pass.type = esPassword ? 'text' : 'password';
                        eye.className = esPassword ? 'fas fa-eye-slash' : 'fas fa-eye';
                    };
                }

                if (btn) {
                    btn.onclick = function() {
                        var val = pass.value.toLowerCase().trim();
                        if (val === 'admin123' || val === 'entrar' || val === 'godmode') {
                            ingresar();
                        } else {
                            document.getElementById('login-error').style.display = 'block';
                        }
                    };
                }

                if (bypass) {
                    bypass.onclick = ingresar;
                }
            }

            function ingresar() {
                document.getElementById('view-login').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('app-container').classList.remove('hidden');
                console.log("Sistema desbloqueado");
            }

            // Ejecucion inicial
            window.onload = alCargar;
        })();
    </script>
</body>
</html>
